<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upload Apartment</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(to bottom, #f7d5ea 0%, #e3dafb 60%, #e3dafb 100%);
      overflow-y: auto;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', Arial, sans-serif;
    }
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 50%;
      background: linear-gradient(135deg, #f7d5ea 0%, #e3dafb 100%);
      clip-path: ellipse(70% 100% at 50% 0%);
      z-index: 0;
    }
    body::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 50%;
      background: linear-gradient(135deg, #e3dafb 0%, #f7d5ea 100%);
      clip-path: ellipse(70% 100% at 50% 100%);
      z-index: 0;
    }
    .apt-card {
      position: relative;
      z-index: 10;
      max-width: 28rem;
      width: 100%;
      background: white;
      border-radius: 1.5rem;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
      border: 1px solid #e5e7eb;
      padding: 2.5rem 2rem 3.5rem 2rem;
      margin: 2rem 0 3rem 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 80vh;
      justify-content: flex-start;
    }
    .close-btn {
      position: absolute;
      top: 1.25rem;
      left: 1.25rem;
      background: white;
      border-radius: 9999px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 0.5rem 0.7rem;
      z-index: 20;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }
    .close-btn:hover {
      background: #f3e8ff;
    }
    h2 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 1.5rem;
      font-weight: bold;
      color: #541257;
    }
    label {
      font-weight: 600;
      color: #541257;
      margin-bottom: 6px;
      display: block;
      margin-top: 12px;
    }
    select, input[type="text"], input[type="date"], textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      font-size: 15px;
      background: #f8f6fc;
      color: #541257;
      transition: border 0.2s;
      outline: none;
    }
    select:focus, input[type="text"]:focus, input[type="date"]:focus, textarea:focus {
      border: 1.5px solid #a23bb1;
      background: #f3e8ff;
    }
    .features {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0 24px;
      justify-content: center;
    }
    .feature-btn {
      padding: 10px 16px;
      border: 1.5px solid #a23bb1;
      border-radius: 20px;
      font-size: 14px;
      background-color: #fff;
      color: #a23bb1;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 500;
    }
    .feature-btn.active {
      background-color: #a23bb1;
      color: white;
      border-color: #a23bb1;
    }
    .rooms {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      justify-content: center;
    }
    .rooms button {
      flex: 1;
      padding: 10px;
      font-size: 14px;
      border: 1.5px solid #a23bb1;
      border-radius: 20px;
      background-color: #fff;
      color: #a23bb1;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 500;
    }
    .rooms button.active {
      background-color: #a23bb1;
      color: white;
      border-color: #a23bb1;
    }
    textarea {
      resize: vertical;
      height: 80px;
    }
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 12px;
      margin-bottom: 16px;
    }
    .photo-upload {
      width: 100%;
      aspect-ratio: 1;
      background-color: #f3e8ff;
      border: 2.5px dashed #a23bb1;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      color: #a23bb1;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border 0.2s, background 0.2s;
      min-width: 90px;
      min-height: 90px;
      max-width: 140px;
      max-height: 140px;
      margin: 0 auto;
    }
    .photo-upload:hover {
      background-color: #e0d9ff;
      border-color: #541257;
    }
    .photo-upload span {
      font-size: 2.5rem;
      font-weight: bold;
      color: #a23bb1;
      opacity: 0.7;
      pointer-events: none;
      transition: color 0.2s;
    }
    .photo-upload img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 12px;
      display: none;
    }
    .photo-upload input {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }
    .submit-btn {
      width: 100%;
      background-color: #a23bb1;
      color: white;
      padding: 18px 0 18px 0;
      border: none;
      border-radius: 24px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      cursor: pointer;
      margin-top: 32px;
      margin-bottom: 0;
      box-shadow: 0 2px 8px rgba(162,59,177,0.08);
      transition: background 0.2s;
      letter-spacing: 0.5px;
    }
    .submit-btn:hover {
      background-color: #541257;
    }
    .popup {
      position: fixed;
      left: 50%;
      bottom: 40px;
      transform: translateX(-50%);
      background-color: #4BB543;
      color: white;
      padding: 18px 32px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.13);
      font-size: 1.1rem;
      font-weight: 600;
      display: none;
      z-index: 9999;
      text-align: center;
      letter-spacing: 0.5px;
    }
    .section-title {
      font-weight: bold;
      color: #541257;
      font-size: 1.1rem;
      margin-bottom: 8px;
      margin-top: 18px;
      text-align: left;
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="apt-card">
    <a href="apt-room.html" class="close-btn" title="Back to main selection">
      <i class="fas fa-times text-gray-700 text-xl"></i>
    </a>
    <h2>Upload A New Apartment</h2>

    <div class="section-title">City</div>
    <select id="city">
      <option disabled selected value="">City</option>
      <option>Tel Aviv</option>
      <option>Jerusalem</option>
      <option>Haifa</option>
    </select>

    <div class="section-title">Area</div>
    <select id="area">
      <option disabled selected value="">Area</option>
      <option>Center</option>
      <option>North</option>
      <option>South</option>
    </select>

    <div class="section-title">Contract</div>
    <select id="contract">
      <option disabled selected value="">Contract</option>
      <option>Long term</option>
      <option>Short term</option>
      <option>Sublet</option>
    </select>

    <div class="section-title">Features</div>
    <div class="features">
      <button class="feature-btn">🏠 Balcony</button>
      <button class="feature-btn">🛗 Elevator</button>
      <button class="feature-btn">🛡 Mamad</button>
      <button class="feature-btn">📶 Wifi</button>
      <button class="feature-btn">🚗 Parking</button>
      <button class="feature-btn">📦 Storage</button>
      <button class="feature-btn">♿ Accessible</button>
    </div>

    <div class="section-title">How many rooms are there in total in the apartment?</div>
    <div class="rooms">
      <button>2</button>
      <button>2.5</button>
      <button>3</button>
      <button>4</button>
      <button>5</button>
    </div>

    <div class="section-title">Room price</div>
    <input type="text" id="roomPrice" placeholder="0" />

    <div class="section-title">Detail of furniture in the room</div>
    <textarea placeholder="Describe the furniture..."></textarea>

    <div class="section-title">Date of entry</div>
    <input type="date" value="2025-01-01" />

    <div class="section-title">Add photos</div>
    <div class="photo-grid">
      <div class="photo-upload">
        <span>+</span>
        <input type="file" accept="image/*" onchange="previewImage(event, 0)">
        <img id="preview-0">
      </div>
      <div class="photo-upload">
        <span>+</span>
        <input type="file" accept="image/*" onchange="previewImage(event, 1)">
        <img id="preview-1">
      </div>
      <div class="photo-upload">
        <span>+</span>
        <input type="file" accept="image/*" onchange="previewImage(event, 2)">
        <img id="preview-2">
      </div>
      <div class="photo-upload">
        <span>+</span>
        <input type="file" accept="image/*" onchange="previewImage(event, 3)">
        <img id="preview-3">
      </div>
      <div class="photo-upload">
        <span>+</span>
        <input type="file" accept="image/*" onchange="previewImage(event, 4)">
        <img id="preview-4">
      </div>
      <div class="photo-upload">
        <span>+</span>
        <input type="file" accept="image/*" onchange="previewImage(event, 5)">
        <img id="preview-5">
      </div>
    </div>

    <button class="submit-btn" id="submitBtn" type="button">I'm done</button>
  </div>

  <!-- ✅ Popup Element -->
  <div id="successPopup" class="popup">
    <span style="font-size:1.2em;">🎉</span><br>
    Your apartment was uploaded!<br>
    Now let's find you a roommate.
  </div>

  <script>
    // --- Data Service Abstraction ---
    async function getApartments() {
      return JSON.parse(localStorage.getItem('apartments') || '[]');
    }
    async function saveApartments(apartments) {
      localStorage.setItem('apartments', JSON.stringify(apartments));
    }
    async function getRoommateSeekers() {
      return JSON.parse(localStorage.getItem('roommate_seekers') || '[]');
    }
    async function saveRoommateSeekers(seekers) {
      localStorage.setItem('roommate_seekers', JSON.stringify(seekers));
    }
    async function getUserApartment() {
      return JSON.parse(localStorage.getItem('user_apartment') || 'null');
    }
    async function saveUserApartment(apt) {
      localStorage.setItem('user_apartment', JSON.stringify(apt));
    }
    // --- End Data Service ---

    // Feature toggle multi-select
    document.querySelectorAll('.feature-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        btn.classList.toggle('active');
      });
    });

    // Room button toggle - single select
    document.querySelectorAll('.rooms button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.rooms button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    // Room price integer-only input
    document.getElementById('roomPrice').addEventListener('input', function () {
      this.value = this.value.replace(/[^\d]/g, '');
    });

    // Image preview
    function previewImage(event, index) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = document.getElementById('preview-' + index);
          img.src = e.target.result;
          img.style.display = "block";
          event.target.previousElementSibling.style.display = "none"; // hides "+"
        };
        reader.readAsDataURL(file);
      }
    }

    // ✅ Show popup on submit with validation
    document.getElementById('submitBtn').addEventListener('click', async function() {
      const btn = this;
      btn.disabled = true;
      btn.textContent = 'Uploading...';

      try {
        // Validate city
        const city = document.getElementById('city').value;
        if (!city) throw new Error('Please select a city.');
        // Validate area
        const area = document.getElementById('area').value;
        if (!area) throw new Error('Please select an area.');
        // Validate contract
        const contract = document.getElementById('contract').value;
        if (!contract) throw new Error('Please select a contract type.');
        // Validate at least one feature
        const features = document.querySelectorAll('.feature-btn.active');
        if (features.length === 0) throw new Error('Please select at least one feature.');
        // Validate room selection
        const rooms = document.querySelectorAll('.rooms button.active');
        if (rooms.length === 0) throw new Error('Please select the number of rooms.');
        // Validate price
        const price = document.getElementById('roomPrice').value.trim();
        if (!price || isNaN(price) || Number(price) <= 0) throw new Error('Please enter a valid room price.');
        // Validate furniture description
        const furniture = document.querySelector('textarea').value.trim();
        if (!furniture) throw new Error('Please describe the furniture.');
        // Validate date
        const date = document.querySelector('input[type="date"]').value;
        if (!date) throw new Error('Please select a date of entry.');

        // For testing: always use a placeholder image to avoid quota errors
        const mainPhoto = 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
        const additionalPhotos = [];

        // Save apartment details to localStorage
        const aptData = {
          city,
          area,
          contract,
          features: Array.from(features).map(f => f.textContent.trim()),
          rooms: rooms[0].textContent.trim(),
          price,
          furniture,
          date,
          mainPhoto,
          additionalPhotos
        };

        // Save to localStorage
        localStorage.setItem('user_apartment', JSON.stringify(aptData));

        // Also save to apartments array
        let apartments = JSON.parse(localStorage.getItem('apartments') || '[]');
        if (!Array.isArray(apartments)) apartments = [];
        // Check if apartment already exists
        const exists = apartments.some(a => 
          a.city === city && 
          a.rooms === rooms[0].textContent.trim() && 
          a.price === price && 
          a.date === date
        );
        if (!exists) {
          apartments.push(aptData);
          localStorage.setItem('apartments', JSON.stringify(apartments));
        }

        // Update roommate seekers array
        const userEmail = localStorage.getItem('user_email') || '';
        let roommateSeekers = JSON.parse(localStorage.getItem('roommate_seekers') || '[]');
        
        const seekerData = {
          name: localStorage.getItem('user_name') || '',
          email: userEmail,
          age: localStorage.getItem('user_age') || '',
          interests: JSON.parse(localStorage.getItem('user_interests') || '[]'),
          preferences: aptData,
          photo: 'https://cdn-icons-png.flaticon.com/512/149/149071.png'
        };

        // Remove any existing entries for this user
        roommateSeekers = roommateSeekers.filter(s => s.email !== userEmail);
        roommateSeekers.push(seekerData);
        localStorage.setItem('roommate_seekers', JSON.stringify(roommateSeekers));

        // Show success popup and redirect
        const popup = document.getElementById('successPopup');
        popup.style.display = 'block';
        
        setTimeout(() => {
          window.location.href = 'roomate.html';
        }, 2000);

      } catch (err) {
        alert(err.message || 'Something went wrong');
      } finally {
        btn.disabled = false;
        btn.textContent = "I'm done";
      }
    });
  </script>

</body>
</html>
